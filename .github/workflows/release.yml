name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.12.3 or v1.12.3-platform)"
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}

jobs:
  verify:
    name: Release preflight
    runs-on: ubuntu-24.04

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        run: cd frontend && bun install --frozen-lockfile

      - name: Run frontend lint
        run: cd frontend && bun run lint

      - name: Run frontend type check
        run: cd frontend && bun run typecheck

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Ruff check
        run: uvx ruff check .

      - name: Ruff format check
        run: uvx ruff format --check .

      - name: Ty check
        run: uv run ty check

      - name: Validate OpenSpec specs
        run: npx --yes @fission-ai/openspec@1.3.1 validate --specs

      - name: Run release-focused tests
        run: >-
          uv run pytest -q
          tests/unit/test_helm_external_secrets.py
          tests/unit/test_api_keys_service.py
          tests/integration/test_openai_compat_features.py

      - name: Validate migration policy and drift
        shell: bash
        run: |
          set -euo pipefail
          TMP_DB="$(mktemp -u /tmp/codex-lb-cinamon-release-migrate-XXXXXX.db)"
          DB_URL="sqlite+aiosqlite:///${TMP_DB}"
          uv run codex-lb-cinamon-db --db-url "${DB_URL}" upgrade head
          uv run codex-lb-cinamon-db --db-url "${DB_URL}" check

      - name: Assert prod overlay fails without SecretStore
        shell: bash
        run: |
          set -euo pipefail
          if helm template codex-lb deploy/helm/codex-lb -f deploy/helm/codex-lb/values-prod.yaml >/tmp/codex-lb-helm-prod.out 2>/tmp/codex-lb-helm-prod.err; then
            cat /tmp/codex-lb-helm-prod.out
            echo "values-prod.yaml rendered without externalSecrets.secretStoreRef.name"
            exit 1
          fi
          grep -q "externalSecrets.secretStoreRef.name is required" /tmp/codex-lb-helm-prod.err

      - name: Validate prod overlay render on Kubernetes 1.35
        run: >-
          helm template codex-lb deploy/helm/codex-lb
          -f deploy/helm/codex-lb/values-prod.yaml
          --set externalSecrets.secretStoreRef.name=test-store
          --kube-version 1.35.0
          --show-only templates/externalsecret.yaml

  build:
    name: Build (sdist + wheel)
    needs: [verify]
    runs-on: ubuntu-24.04

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install frontend dependencies
        run: cd frontend && bun install --frozen-lockfile

      - name: Build frontend assets
        run: cd frontend && bun run build

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Verify tag matches project version
        shell: bash
        run: |
          python - <<'PY'
          import os
          import re
          import sys
          from pathlib import Path
          try:
              import tomllib
          except Exception:
              import tomli as tomllib

          tag = os.environ.get("RELEASE_TAG", "")
          if not tag:
              print("Missing RELEASE_TAG")
              sys.exit(1)

          match = re.fullmatch(r"v(\d+\.\d+\.\d+)(-[0-9A-Za-z.-]+)?", tag)
          if not match:
              print(f"Invalid tag format: {tag!r}")
              sys.exit(1)

          tag_version = match.group(1)
          project = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          project_version = project["project"]["version"]
          if project_version != tag_version:
              print(
                  f"pyproject.toml version ({project_version}) does not match tag ({tag_version})"
              )
              sys.exit(1)

          print(f"OK: {tag} matches pyproject.toml version {project_version}")
          PY

      - name: Build sdist + wheel
        run: uv build --no-sources

      - name: Verify wheel contains frontend assets
        shell: bash
        run: |
          python - <<'PY'
          import glob
          import zipfile

          wheels = glob.glob("dist/*.whl")
          if not wheels:
              raise SystemExit("no wheel found in dist/")

          wheel = wheels[0]
          with zipfile.ZipFile(wheel) as zf:
              names = set(zf.namelist())
              has_index = "app/static/index.html" in names
              has_js = any(
                  name.startswith("app/static/assets/") and name.endswith(".js")
                  for name in names
              )
              has_css = any(
                  name.startswith("app/static/assets/") and name.endswith(".css")
                  for name in names
              )

          if not (has_index and has_js and has_css):
              raise SystemExit(
                  f"frontend assets missing in wheel: index={has_index} js={has_js} css={has_css}"
              )
          print(f"frontend assets verified in wheel: {wheel}")
          PY

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish-to-pypi:
    name: Publish to PyPI
    if: ${{ !contains(github.event.release.tag_name || inputs.tag, '-') }}
    needs: [build]
    runs-on: ubuntu-24.04

    permissions:
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/project/codex-lb-cinamon/

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: List dist files
        run: ls -la dist/

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          print-hash: true

  docker-image:
    name: Build and push Docker image
    needs: [build]
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ env.RELEASE_TAG }}
            type=raw,value=latest

      - name: Build Docker image for scan
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: codex-lb-cinamon:release-scan
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: codex-lb-cinamon:release-scan
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
