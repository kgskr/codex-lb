{{- if .Values.externalSecrets.enabled }}
{{- $secretStoreNameRequiredMessage := "externalSecrets.secretStoreRef.name is required when externalSecrets.enabled=true" }}
{{- $secretStoreName := required $secretStoreNameRequiredMessage .Values.externalSecrets.secretStoreRef.name }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "codex-lb.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "codex-lb.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ $secretStoreName | quote }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind | quote }}
  target:
    name: {{ include "codex-lb.secretName" . }}
    creationPolicy: Owner
  data:
    - secretKey: {{ .Values.auth.secretKeys.databaseUrl }}
      remoteRef:
        key: {{ include "codex-lb.fullname" . }}
        property: database-url
    - secretKey: {{ .Values.auth.secretKeys.encryptionKey }}
      remoteRef:
        key: {{ include "codex-lb.fullname" . }}
        property: encryption-key
{{- end }}
